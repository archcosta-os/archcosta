title   ArchCosta Linux install medium (x86_64, UEFI)
linux   /%INSTALL_DIR%/boot/%ARCH%/vmlinuz-linux-lts
initrd  /%INSTALL_DIR%/boot/%ARCH%/initramfs-linux-lts.img
options archisobasedir=%INSTALL_DIR% archisolabel=%ARCHISO_LABEL% rw quiet splash loglevel=3 nowatchdog mitigations=off audit=0 nvme_load=YES copytoram=y modprobe.blacklist=pcspkr cow_spacesize=2G

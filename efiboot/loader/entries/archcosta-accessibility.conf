title   ArchCosta Linux accessibility (speakup screen reader)
sort-key 02
linux   /%INSTALL_DIR%/boot/%ARCH%/vmlinuz-linux
initrd  /%INSTALL_DIR%/boot/%ARCH%/initramfs-linux.img
options archisobasedir=%INSTALL_DIR% archisosearchuuid=%ARCHISO_UUID% accessibility=on rw quiet splash loglevel=3 nowatchdog mitigations=off audit=0 nvme_load=yes i915.modeset=1 radeon.modeset=1 nouveau.modeset=1 module_blacklist=pcspkr,nvidia,nvidia_drm,nvidia_modeset,nvidia_uvm cow_spacesize=2G

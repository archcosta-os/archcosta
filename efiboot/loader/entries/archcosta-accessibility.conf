title ArchCosta (Accessibility)
linux /%INSTALL_DIR%/boot/%ARCH%/vmlinuz-linux
initrd /%INSTALL_DIR%/boot/intel-ucode.img
initrd /%INSTALL_DIR%/boot/amd-ucode.img
initrd /%INSTALL_DIR%/boot/%ARCH%/initramfs-linux.img
options archisobasedir=%INSTALL_DIR% archisolabel=%ARCHISO_LABEL% accessibility=on rw quiet loglevel=3 nowatchdog audit=0 nvme_load=YES modprobe.blacklist=pcspkr,nvidia,nvidia_drm,nvidia_modeset,nvidia_uvm cow_spacesize=2G i915.modeset=1 radeon.modeset=1 nouveau.modeset=1

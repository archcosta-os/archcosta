title   ArchCosta Linux install medium (x86_64, UEFI)
linux   /%INSTALL_DIR%/boot/%ARCH%/vmlinuz-linux
initrd  /%INSTALL_DIR%/boot/intel-ucode.img
initrd  /%INSTALL_DIR%/boot/amd-ucode.img
initrd  /%INSTALL_DIR%/boot/%ARCH%/initramfs-linux.img
options archisobasedir=%INSTALL_DIR% archisolabel=%ARCHISO_LABEL% rw loglevel=7 systemd.show_status=1 systemd.log_level=debug systemd.log_target=kmsg udev.log_priority=debug nowatchdog mitigations=off audit=0 nvme_load=YES copytoram=y modprobe.blacklist=pcspkr,nvidia,nvidia_drm,nvidia_modeset,nvidia_uvm cow_spacesize=2G i915.modeset=1 radeon.modeset=1 nouveau.modeset=1

title   ArchCosta Linux install medium (x86_64, UEFI)
linux   /%INSTALL_DIR%/boot/%ARCH%/vmlinuz-linux-cachyos
initrd  /%INSTALL_DIR%/boot/%ARCH%/initramfs-linux-cachyos.img
options archisobasedir=%INSTALL_DIR% archisolabel=ARCHCOSTA rw quiet splash loglevel=3 nowatchdog mitigations=off audit=0 nvme_load=YES copytoram=y modprobe.blacklist=pcspkr cow_spacesize=2G

title   ArchCosta Linux install medium (x86_64, UEFI) ZEN Kernel
sort-key 01
linux   /%INSTALL_DIR%/boot/%ARCH%/vmlinuz-linux-zen
initrd  /%INSTALL_DIR%/boot/%ARCH%/initramfs-linux-zen.img
options archisobasedir=%INSTALL_DIR% archisosearchuuid=%ARCHISO_UUID% rw quiet splash loglevel=3 nowatchdog mitigations=off audit=0 nvme_load=yes copytoram=n i915.modeset=1 radeon.modeset=1 nouveau.modeset=1 module_blacklist=pcspkr,nvidia,nvidia_drm,nvidia_modeset,nvidia_uvm cow_spacesize=2G

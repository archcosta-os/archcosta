DEFAULT archcosta
PROMPT 0
TIMEOUT 50

LABEL archcosta
  MENU LABEL ArchCosta Linux (Copy to RAM)
  LINUX /%INSTALL_DIR%/boot/%ARCH%/vmlinuz-linux-lts
  INITRD /%INSTALL_DIR%/boot/%ARCH%/initramfs-linux-lts.img
  APPEND archisobasedir=%INSTALL_DIR% archisolabel=ARCHCOSTA rw quiet splash loglevel=3 audit=0 nvme_load=YES nowatchdog mitigations=off modprobe.blacklist=pcspkr cow_spacesize=2G copytoram=y

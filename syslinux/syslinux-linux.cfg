DEFAULT archcosta
PROMPT 0
TIMEOUT 50

LABEL archcosta
  MENU LABEL ArchCosta Linux (Standard)
  LINUX /%INSTALL_DIR%/boot/%ARCH%/vmlinuz-linux
  INITRD /%INSTALL_DIR%/boot/%ARCH%/initramfs-linux.img
  APPEND archisobasedir=%INSTALL_DIR% archisosearchuuid=%ARCHISO_UUID% rw quiet splash loglevel=3 audit=0 nvme_load=yes nowatchdog mitigations=off i915.modeset=1 radeon.modeset=1 nouveau.modeset=1 module_blacklist=pcspkr,nvidia,nvidia_drm,nvidia_modeset,nvidia_uvm cow_spacesize=2G copytoram=n

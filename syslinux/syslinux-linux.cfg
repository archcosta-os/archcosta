DEFAULT archcosta
UI vesamenu.c32
PROMPT 0
MENU TITLE ArchCosta (BIOS)
TIMEOUT 20

LABEL archcosta
  MENU LABEL ArchCosta
  LINUX /%INSTALL_DIR%/boot/%ARCH%/vmlinuz-linux
  INITRD /%INSTALL_DIR%/boot/intel-ucode.img,/%INSTALL_DIR%/boot/amd-ucode.img,/%INSTALL_DIR%/boot/%ARCH%/initramfs-linux.img
  APPEND archisobasedir=%INSTALL_DIR% archisolabel=%ARCHISO_LABEL% rw quiet loglevel=3 audit=0 nvme_load=YES nowatchdog modprobe.blacklist=pcspkr,nvidia,nvidia_drm,nvidia_modeset,nvidia_uvm cow_spacesize=2G copytoram=y i915.modeset=1 radeon.modeset=1 nouveau.modeset=1

DEFAULT archcosta
UI vesamenu.c32
PROMPT 0
MENU TITLE ArchCosta BIOS Boot Menu
TIMEOUT 50

LABEL archcosta
  MENU LABEL ArchCosta Linux (Standard)
  LINUX /%INSTALL_DIR%/boot/%ARCH%/vmlinuz-linux
  INITRD /%INSTALL_DIR%/boot/%ARCH%/initramfs-linux.img
  APPEND archisobasedir=%INSTALL_DIR% archisolabel=%ARCHISO_LABEL% rw quiet splash loglevel=3 audit=0 nvme_load=YES nowatchdog mitigations=off modprobe.blacklist=pcspkr cow_spacesize=2G copytoram=n

LABEL archcosta_ram
  MENU LABEL ArchCosta Linux (Copy to RAM)
  LINUX /%INSTALL_DIR%/boot/%ARCH%/vmlinuz-linux
  INITRD /%INSTALL_DIR%/boot/%ARCH%/initramfs-linux.img
  APPEND archisobasedir=%INSTALL_DIR% archisolabel=%ARCHISO_LABEL% rw quiet splash loglevel=3 audit=0 nvme_load=YES nowatchdog mitigations=off modprobe.blacklist=pcspkr cow_spacesize=2G copytoram=y

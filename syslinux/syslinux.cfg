DEFAULT archcosta
UI vesamenu.c32
PROMPT 0
MENU TITLE ArchCosta Linux
TIMEOUT 30

LABEL archcosta
  MENU LABEL Boot ArchCosta
  LINUX /%INSTALL_DIR%/boot/%ARCH%/vmlinuz-linux
  INITRD /%INSTALL_DIR%/boot/intel-ucode.img,/%INSTALL_DIR%/boot/amd-ucode.img,/%INSTALL_DIR%/boot/%ARCH%/initramfs-linux.img
  APPEND archisobasedir=%INSTALL_DIR% archisolabel=%ARCHISO_LABEL% rw quiet loglevel=3

LABEL archcosta_install
  MENU LABEL Install ArchCosta
  LINUX /%INSTALL_DIR%/boot/%ARCH%/vmlinuz-linux
  INITRD /%INSTALL_DIR%/boot/intel-ucode.img,/%INSTALL_DIR%/boot/amd-ucode.img,/%INSTALL_DIR%/boot/%ARCH%/initramfs-linux.img
  APPEND archisobasedir=%INSTALL_DIR% archisolabel=%ARCHISO_LABEL% rw quiet loglevel=3 systemd.unit=graphical.target

LABEL archcosta_failsafe
  MENU LABEL Boot (Debug Mode)
  LINUX /%INSTALL_DIR%/boot/%ARCH%/vmlinuz-linux
  INITRD /%INSTALL_DIR%/boot/intel-ucode.img,/%INSTALL_DIR%/boot/amd-ucode.img,/%INSTALL_DIR%/boot/%ARCH%/initramfs-linux.img
  APPEND archisobasedir=%INSTALL_DIR% archisolabel=%ARCHISO_LABEL% rw loglevel=7 systemd.show_status=1

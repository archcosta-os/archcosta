DEFAULT archcosta
UI vesamenu.c32
PROMPT 0
MENU TITLE ArchCosta BIOS Boot Menu (linux-cachyos)
TIMEOUT 50

LABEL archcosta
  MENU LABEL ArchCosta Linux (Copy to RAM)
  LINUX /%INSTALL_DIR%/boot/%ARCH%/vmlinuz-linux-cachyos
  INITRD /%INSTALL_DIR%/boot/%ARCH%/initramfs-linux-cachyos.img
  APPEND archisobasedir=%INSTALL_DIR% archisolabel=%ARCHISO_LABEL% rw quiet splash loglevel=3 audit=0 nvme_load=YES nowatchdog mitigations=off modprobe.blacklist=pcspkr,nvidia,nvidia_drm,nvidia_modeset,nvidia_uvm cow_spacesize=2G copytoram=y i915.modeset=1 radeon.modeset=1 nouveau.modeset=1

[options]
HoldPkg     = pacman glibc
Architecture = auto
ParallelDownloads = 5
SigLevel    = Never
LocalFileSigLevel = Optional

# ArchCosta Official Repo (Primary)
[archcosta]
SigLevel = Optional TrustAll
Server = https://archcosta-os.github.io/archcosta-repo/x86_64

# ArchCosta Official Repo (GitHub Raw Fallback)
[archcosta]
SigLevel = Optional TrustAll
Server = https://raw.githubusercontent.com/archcosta-os/archcosta-repo/main/x86_64

[core]
Include = /etc/pacman.d/mirrorlist

[extra]
Include = /etc/pacman.d/mirrorlist

[multilib]
Include = /etc/pacman.d/mirrorlist

# Linexin Repo (Keep as fallback)
[linexin-repo]
SigLevel = Optional TrustAll
Server = https://petexy.github.io/linexin-repo/x86_64

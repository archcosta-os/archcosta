insmod part_gpt
insmod part_msdos
insmod fat
insmod iso9660

insmod all_video
insmod font

set default=0
set timeout=5

menuentry "ArchCosta Linux Spark" {
    linux   /%INSTALL_DIR%/boot/%ARCH%/vmlinuz-linux-cachyos \
            archisobasedir=%INSTALL_DIR% archisolabel=ARCHCOSTA_SPARK rw quiet splash \
            loglevel=3 nowatchdog mitigations=off
    initrd  /%INSTALL_DIR%/boot/%ARCH%/initramfs-linux-cachyos.img
}

insmod part_gpt
insmod part_msdos
insmod fat
insmod iso9660

insmod all_video
insmod font

set default=0
set timeout=5

menuentry "ArchCosta Linux" {
    linux   /boot/vmlinuz-linux-cachyos \
            archisobasedir=arch archisolabel=ARCHCOSTA rw quiet splash \
            loglevel=3 nowatchdog mitigations=off
    initrd  /boot/intel-ucode.img /boot/amd-ucode.img /boot/initramfs-linux-cachyos.img
}

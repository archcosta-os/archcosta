[options]
HoldPkg     = pacman glibc
Architecture = auto
ParallelDownloads = 5
SigLevel    = Required DatabaseOptional
LocalFileSigLevel = Optional

[core]
Include = /etc/pacman.d/mirrorlist

[extra]
Include = /etc/pacman.d/mirrorlist

# CachyOS Main Repo (Generic x86_64)
[cachyos]
Server = https://mirror.cachyos.org/repo/x86_64/cachyos
Server = https://cdn77.cachyos.org/repo/x86_64/cachyos
SigLevel = Optional TrustAll

# ArchCosta Custom Repo
[archcosta]
Server = https://archcosta-os.github.io/archcosta-pkgbuilds/
SigLevel = Optional TrustAll

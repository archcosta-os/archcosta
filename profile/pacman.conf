[options]
HoldPkg     = pacman glibc
Architecture = auto
ParallelDownloads = 5
SigLevel    = Never
LocalFileSigLevel = Optional

# ArchCosta Official Repo (GitHub Hosted)
[archcosta]
SigLevel = Optional TrustAll
Server = https://github.com/archcosta-os/archcosta-repo/raw/main/x86_64

# ArchCosta Custom Repo (Local Fallback)
#[archcosta]
#SigLevel = Optional TrustAll
#Server = file:///repo-local

[core]
Include = /etc/pacman.d/mirrorlist

[extra]
Include = /etc/pacman.d/mirrorlist

[multilib]
Include = /etc/pacman.d/mirrorlist

# Linexin Repo (Keep as fallback)
[linexin-repo]
SigLevel = Optional TrustAll
Server = https://petexy.github.io/linexin-repo/x86_64

[options]
HoldPkg     = pacman glibc
Architecture = auto
ParallelDownloads = 5
SigLevel    = Never
LocalFileSigLevel = Optional

[core]
Server = https://geo.mirror.pkgbuild.com/$repo/os/$arch

[extra]
Server = https://geo.mirror.pkgbuild.com/$repo/os/$arch

# Archcraft Repo (for specialized packages)
[archcraft]
Server = https://raw.githubusercontent.com/archcraft-os/archcraft-packages/main/x86_64
SigLevel = Never

# ArchCosta Custom Repo
[archcosta]
Server = https://archcosta-os.github.io/archcosta-pkgbuilds/
SigLevel = Never

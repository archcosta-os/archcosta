insmod part_gpt
insmod part_msdos
insmod fat
insmod iso9660

insmod all_video
insmod font

set default=0
set timeout=5

# Load theme if it exists
if [ -f "/boot/grub/themes/archcosta/theme.txt" ]; then
    set theme="/boot/grub/themes/archcosta/theme.txt"
fi

menuentry "ArchCosta Linux (Standard)" --class arch --class gnu-linux --class gnu --class os {
    set gfxpayload=keep
    linux   /%INSTALL_DIR%/boot/%ARCH%/vmlinuz-linux \
            archisobasedir=%INSTALL_DIR% archisolabel=%ARCHISO_LABEL% \
            rw quiet splash loglevel=3 audit=0 nvme_load=YES nowatchdog mitigations=off \
            modprobe.blacklist=pcspkr cow_spacesize=2G copytoram=n
    initrd  /%INSTALL_DIR%/boot/intel-ucode.img /%INSTALL_DIR%/boot/amd-ucode.img /%INSTALL_DIR%/boot/%ARCH%/initramfs-linux.img
}

menuentry "ArchCosta Linux (Copy to RAM)" --class arch --class gnu-linux --class gnu --class os {
    set gfxpayload=keep
    linux   /%INSTALL_DIR%/boot/%ARCH%/vmlinuz-linux \
            archisobasedir=%INSTALL_DIR% archisolabel=%ARCHISO_LABEL% \
            rw quiet splash loglevel=3 audit=0 nvme_load=YES nowatchdog mitigations=off \
            modprobe.blacklist=pcspkr cow_spacesize=2G copytoram=y
    initrd  /%INSTALL_DIR%/boot/intel-ucode.img /%INSTALL_DIR%/boot/amd-ucode.img /%INSTALL_DIR%/boot/%ARCH%/initramfs-linux.img
}

name: Build ISO

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 1 * *'   # Monthly ISO builds

jobs:
  iso:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
      options: --privileged

    steps:
      - uses: actions/checkout@v4

      - name: Cache Pacman Packages
        uses: actions/cache@v4
        with:
          path: /var/cache/pacman/pkg
          key: ${{ runner.os }}-pacman-${{ hashFiles('profile/packages.x86_64') }}
          restore-keys: |
            ${{ runner.os }}-pacman-

      - name: Setup Build Environment
        run: |
          pacman-key --init
          pacman-key --populate archlinux
          pacman -Syu --noconfirm archiso grub mtools dosfstools libisoburn squashfs-tools git curl pv nbd mkinitcpio-nfs-utils zip jq

      - name: Build ISO
        run: |
          mkdir -p /tmp/out
          mkarchiso -v -w /tmp/work -o /tmp/out profile/

      - name: Upload to GoFile (Public Download)
        run: |
          ISO_FILE=$(ls /tmp/out/*.iso)
          ISO_NAME=$(basename "$ISO_FILE")
          
          echo "Finding best GoFile server..."
          # Fetch server with timeout and error handling
          SERVER_JSON=$(curl -s --max-time 10 https://api.gofile.io/getServer)
          
          # Only try parsing if we got a response
          if [ -n "$SERVER_JSON" ]; then
            SERVER=$(echo "$SERVER_JSON" | jq -r '.data.server // "store1"')
          else
            SERVER="store1"
          fi
          
          echo "Uploading $ISO_NAME to GoFile server: $SERVER..."
          
          RESPONSE=$(curl -F "file=@$ISO_FILE" "https://${SERVER}.gofile.io/uploadFile")
          DOWNLOAD_URL=$(echo "$RESPONSE" | jq -r '.data.downloadPage // "null"')
          
          if [ "$DOWNLOAD_URL" != "null" ]; then
            echo "--------------------------------------------------------------------------------"
            echo "🚀 PUBLIC DOWNLOAD LINK (No Login Required):"
            echo "$DOWNLOAD_URL"
            echo "--------------------------------------------------------------------------------"
          else
            echo "::warning::GoFile upload failed. Response: $RESPONSE"
          fi

      - name: Upload ISO artifact (GitHub)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: archcosta-iso
          path: /tmp/out/*.iso

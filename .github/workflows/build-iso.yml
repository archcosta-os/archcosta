name: Build ISO

on:
  workflow_dispatch:
    inputs:
      desktop:
        description: 'Desktop Environment / Window Manager to build'
        required: true
        default: 'xfce'
        type: choice
        options:
          - xfce
          - plasma
          - cinnamon
          - mate
          - gnome
          - hyprland
          - sway
          - bspwm
          - openbox
          - wayfire
          - river
          - niri
          - i3wm
          - all
      kernel:
        description: 'Kernel to use'
        required: true
        default: 'linux'
        type: choice
        options:
          - linux
          - linux-zen
          - linux-lts
          - linux-cachyos

env:
  SOURCEFORGE_PROJECT: archcosta

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - id: set-matrix
        run: |
          if [ "${{ github.event.inputs.desktop }}" == "all" ]; then
            echo 'matrix=["xfce", "plasma", "cinnamon", "mate", "gnome", "hyprland", "sway", "bspwm", "openbox", "wayfire", "river", "niri", "i3wm"]' >> $GITHUB_OUTPUT
          else
            echo 'matrix=["${{ github.event.inputs.desktop }}"]' >> $GITHUB_OUTPUT
          fi

  iso:
    name: Build ISO
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      matrix:
        desktop: ${{ fromJson(needs.prepare.outputs.matrix) }}
      fail-fast: false
    container:
      image: archlinux:latest
      options: --privileged

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          clean: false

      - name: Clear All Caches
        run: |
          rm -f /var/lib/pacman/db.lck
          rm -rf /var/lib/pacman/sync/*
          rm -rf /var/cache/pacman/pkg/*
          rm -rf /tmp/work /tmp/out
          rm -rf /root/.ccache
          rm -rf /root/.cache
          rm -rf build-cache
          find /root -name "*.pyc" -delete 2>/dev/null || true
          sed -i 's/SigLevel.*/SigLevel = Never/' /etc/pacman.conf

      - name: Setup Mirrorlist
        run: |
          cp pacman-mirrorlist /etc/pacman.d/mirrorlist

      - name: Sync Pacman
        run: |
          pacman-key --init
          pacman-key --populate archlinux
          pacman -Sy --noconfirm

      - name: Setup Build Environment
        run: |
          pacman -S --noconfirm archiso dracut mtools dosfstools libisoburn squashfs-tools git curl pv nbd zip jq openssh rsync p7zip

      - name: Add CachyOS Repository (for linux-cachyos)
        if: "${{ github.event.inputs.kernel == 'linux-cachyos' }}"
        run: |
          rm -rf /var/lib/pacman/sync/cachyos
          cat >> /etc/pacman.conf << 'EOF'
          
          # CachyOS Repository
          [cachyos]
          SigLevel = Optional TrustAll
          Server = https://mirror.cachyos.org/repo/$arch/cachyos
          EOF
          pacman -Sy --noconfirm

      - name: Configure Kernel-Specific Settings
        run: |
          KERNEL="${{ github.event.inputs.kernel }}"
          DESKTOP="${{ matrix.desktop }}"
          
          echo "==> Kernel: $KERNEL"
          echo "==> Desktop: $DESKTOP"
          
          # Use desktop-specific package list
          if [ -f "packages/${DESKTOP}.x86_64" ]; then
            cp "packages/${DESKTOP}.x86_64" packages.x86_64
            echo "==> Using packages/${DESKTOP}.x86_64"
          else
            echo "==> No specific package file, using default"
          fi
          
          # Replace kernel
          sed -i 's/^linux$/'"$KERNEL"'/' packages.x86_64
          sed -i 's/^linux-headers$/'"$KERNEL"'-headers/' packages.x86_64
          
          # Update ISO name/label
          sed -i "s/iso_name=\"archcosta\"/iso_name=\"archcosta-${DESKTOP}\"/" profiledef.sh
          UPPER_DE=$(echo "${DESKTOP}" | tr '[:lower:]' '[:upper:]')
          sed -i "s/ARCHCOSTA_/ARCHCOSTA_${UPPER_DE}_/" profiledef.sh
          
          cp syslinux/syslinux-${KERNEL}.cfg syslinux/syslinux.cfg
          cp efiboot/loader/entries/archcosta-${KERNEL}.conf efiboot/loader/entries/archcosta.conf
          
          # Update GRUB config for kernel
          case "$KERNEL" in
            linux-zen)
              sed -i 's/vmlinuz-linux$/vmlinuz-linux-zen/' grub/grub.cfg
              sed -i 's/initramfs-linux.img$/initramfs-linux-zen.img/' grub/grub.cfg
              ;;
            linux-lts)
              sed -i 's/vmlinuz-linux$/vmlinuz-linux-lts/' grub/grub.cfg
              sed -i 's/initramfs-linux.img$/initramfs-linux-lts.img/' grub/grub.cfg
              ;;
            linux-cachyos)
              sed -i 's/vmlinuz-linux$/vmlinuz-linux-cachyos/' grub/grub.cfg
              sed -i 's/initramfs-linux.img$/initramfs-linux-cachyos.img/' grub/grub.cfg
              ;;
          esac
          
          # Set correct user-session for each desktop/WM
          case "$DESKTOP" in
            xfce) sed -i 's/^user-session=.*/user-session=xfce/' airootfs/etc/lightdm/lightdm.conf ;;
            plasma) sed -i 's/^user-session=.*/user-session=plasma/' airootfs/etc/lightdm/lightdm.conf ;;
            cinnamon) sed -i 's/^user-session=.*/user-session=cinnamon/' airootfs/etc/lightdm/lightdm.conf ;;
            mate) sed -i 's/^user-session=.*/user-session=mate/' airootfs/etc/lightdm/lightdm.conf ;;
            gnome) sed -i 's/^user-session=.*/user-session=gnome/' airootfs/etc/lightdm/lightdm.conf ;;
            hyprland) sed -i 's/^user-session=.*/user-session=hyprland/' airootfs/etc/lightdm/lightdm.conf ;;
            sway) sed -i 's/^user-session=.*/user-session=sway/' airootfs/etc/lightdm/lightdm.conf ;;
            bspwm) sed -i 's/^user-session=.*/user-session=bspwm/' airootfs/etc/lightdm/lightdm.conf ;;
            openbox) sed -i 's/^user-session=.*/user-session=openbox/' airootfs/etc/lightdm/lightdm.conf ;;
            wayfire) sed -i 's/^user-session=.*/user-session=wayfire/' airootfs/etc/lightdm/lightdm.conf ;;
            river) sed -i 's/^user-session=.*/user-session=river/' airootfs/etc/lightdm/lightdm.conf ;;
            niri) sed -i 's/^user-session=.*/user-session=niri/' airootfs/etc/lightdm/lightdm.conf ;;
            i3wm) sed -i 's/^user-session=.*/user-session=i3/' airootfs/etc/lightdm/lightdm.conf ;;
          esac
          
          echo "==> LightDM user-session configured for $DESKTOP"
          grep "^user-session" airootfs/etc/lightdm/lightdm.conf
          
          echo "==> Final packages.x86_64:"
          tail -n 10 packages.x86_64

      - name: Install Kernel
        run: |
          KERNEL_PKGS=""
          case "${{ github.event.inputs.kernel }}" in
            linux-cachyos) KERNEL_PKGS="linux-cachyos linux-cachyos-headers" ;;
            linux-zen) KERNEL_PKGS="linux-zen linux-zen-headers" ;;
            linux-lts) KERNEL_PKGS="linux-lts linux-lts-headers" ;;
            *) KERNEL_PKGS="linux linux-headers" ;;
          esac
          pacman -S --noconfirm $KERNEL_PKGS

      - name: Build ISO
        run: |
          mkdir -p /tmp/out
          mkarchiso -v -w /tmp/work -o /tmp/out .

      - name: Generate SHA256 Hash
        run: |
          ISO_FILE=$(ls /tmp/out/*.iso)
          sha256sum "$ISO_FILE" > "${ISO_FILE}.sha256"
          cat "${ISO_FILE}.sha256"

      - name: Compress ISO (for GitHub Release limit)
        run: |
          ISO_FILE=$(ls /tmp/out/*.iso)
          echo "ISO size: $(du -h "$ISO_FILE" | cut -f1)"
          7z a -mx=9 "${ISO_FILE}.7z" "$ISO_FILE"
          echo "Compressed size: $(du -h "${ISO_FILE}.7z" | cut -f1)"

      - name: Upload ISO artifact (GitHub)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: archcosta-${{ matrix.desktop }}-${{ github.event.inputs.kernel }}-iso
          path: |
            /tmp/out/*.7z
            /tmp/out/*.sha256

      - name: Create Release
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: rolling
          name: "ArchCosta Rolling Release"
          body: |
            ArchCosta Automated ISO Builds
            
            Kernel: ${{ github.event.inputs.kernel }}
            Desktop: ${{ matrix.desktop }}
            Build Date: ${{ github.event.repository.updated_at }}
            
            **Note:** The ISO is compressed in .7z format to stay within GitHub's file size limits.
          prerelease: true
          files: |
            /tmp/out/*.7z
            /tmp/out/*.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

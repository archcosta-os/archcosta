name: Build ISO

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 1 * *'   # Monthly ISO builds

jobs:
  iso:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
      options: --privileged

    steps:
      - uses: actions/checkout@v4

      - name: Setup repositories on host
        run: |
          # Initialize pacman keyring
          pacman-key --init
          pacman-key --populate archlinux
          
          # Fetch CachyOS key directly to avoid keyserver issues
          curl -O https://mirror.cachyos.org/cachyos-repo.gpg
          pacman-key --add cachyos-repo.gpg
          pacman-key --lsign-key F3B607488DB359F5
          
          # Install dependencies
          pacman -Syu --noconfirm archiso grub mtools dosfstools libisoburn squashfs-tools git

      - name: Build ISO
        run: |
          mkdir -p /tmp/out
          mkarchiso -v -w /tmp/work -o /tmp/out profile/

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: archcosta-iso
          path: /tmp/out/*.iso
name: Build ISO

on:
  workflow_dispatch:
    inputs:
      desktop:
        description: 'Desktop Environment to build'
        required: true
        default: 'xfce'
        type: choice
        options:
          - xfce
          - plasma
          - cinnamon
          - mate
          - all
      kernel:
        description: 'Kernel to use'
        required: true
        default: 'linux'
        type: choice
        options:
          - linux
          - linux-zen
          - linux-lts
          - linux-cachyos

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - id: set-matrix
        run: |
          if [ "${{ github.event.inputs.desktop }}" == "all" ]; then
            echo 'matrix=["xfce", "plasma", "cinnamon", "mate"]' >> $GITHUB_OUTPUT
          else
            echo 'matrix=["${{ github.event.inputs.desktop }}"]' >> $GITHUB_OUTPUT
          fi

  iso:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      matrix:
        desktop: ${{ fromJson(needs.prepare.outputs.matrix) }}
      fail-fast: false
    container:
      image: archlinux:latest
      options: --privileged

    steps:
      - uses: actions/checkout@v4

      - name: Cache Pacman Packages
        uses: actions/cache@v4
        with:
          path: /var/cache/pacman/pkg
          key: ${{ runner.os }}-pacman-${{ matrix.desktop }}-${{ hashFiles('packages.x86_64') }}
          restore-keys: |
            ${{ runner.os }}-pacman-

      - name: Setup Build Environment
        run: |
          pacman-key --init
          pacman-key --populate archlinux
          pacman -Syu --noconfirm archiso grub mtools dosfstools libisoburn squashfs-tools git curl pv nbd mkinitcpio-nfs-utils zip jq

      - name: Add CachyOS Repository (for linux-cachyos)
        if: "${{ github.event.inputs.kernel == 'linux-cachyos' }}"
        run: |
          cat >> /etc/pacman.conf << 'EOF'
          
          # CachyOS Repository
          [cachyos]
          Server = https://mirror.cachyos.org/repo/x86_64/cachyos
          SigLevel = Never
          EOF
          pacman -Sy --noconfirm

      - name: Install Kernel
        run: |
          case "${{ github.event.inputs.kernel }}" in
            linux-cachyos)
              pacman -S --noconfirm linux-cachyos linux-cachyos-headers
              ;;
            linux-zen)
              pacman -S --noconfirm linux-zen linux-zen-headers
              ;;
            linux-lts)
              pacman -S --noconfirm linux-lts linux-lts-headers
              ;;
            *)
              pacman -S --noconfirm linux linux-headers
              ;;
          esac

      - name: Customize Profile for Desktop
        run: |
          # Remove all other desktop meta-packages from packages.x86_64
          DESKTOPS=("archcosta-xfce" "archcosta-plasma" "archcosta-cinnamon" "archcosta-mate")
          CURRENT="archcosta-${{ matrix.desktop }}"
          
          for d in "${DESKTOPS[@]}"; do
            if [ "$d" != "$CURRENT" ]; then
              sed -i "/$d/d" packages.x86_64
            fi
          done
          
          # Update ISO name and label in profiledef.sh
          sed -i "s/iso_name=\"archcosta\"/iso_name=\"archcosta-${{ matrix.desktop }}\"/" profiledef.sh
          
          # Fix label format to include desktop name
          UPPER_DE=$(echo "${{ matrix.desktop }}" | tr '[:lower:]' '[:upper:]')
          sed -i "s/ARCHCOSTA_/ARCHCOSTA_${UPPER_DE}_/" profiledef.sh

      - name: Build ISO
        run: |
          mkdir -p /tmp/out
          mkarchiso -v -w /tmp/work -o /tmp/out .

      - name: Upload to up.sb (Public Download)
        run: |
          ISO_FILE=$(ls /tmp/out/*.iso)
          ISO_NAME=$(basename "$ISO_FILE")
          UPPER_DE=$(echo "${{ matrix.desktop }}" | tr '[:lower:]' '[:upper:]')
          KERNEL_NAME=$(echo "${{ github.event.inputs.kernel }}" | tr '[:lower:]' '[:upper:]')
          
          echo "Uploading $ISO_NAME to up.sb..."
          RESPONSE=$(curl -s https://up.sb -T "$ISO_FILE")
          DOWNLOAD_URL=$(echo "$RESPONSE" | grep -o 'http://up.sb/[^ ]*' | head -n 1)
          
          if [ -n "$DOWNLOAD_URL" ]; then
            echo "--------------------------------------------------------------------------------"
            echo "🚀 PUBLIC DOWNLOAD LINK ($UPPER_DE / $KERNEL_NAME):"
            echo "$DOWNLOAD_URL"
            echo "--------------------------------------------------------------------------------"
          else
            echo "::warning::up.sb upload failed. Response: $RESPONSE"
          fi

      - name: Upload ISO artifact (GitHub)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: archcosta-${{ matrix.desktop }}-${{ github.event.inputs.kernel }}-iso
          path: /tmp/out/*.iso

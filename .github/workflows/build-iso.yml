name: Build ISO

on:
  workflow_dispatch:
    inputs:
      desktop:
        description: 'Desktop Environment to build'
        required: true
        default: 'xfce'
        type: choice
        options:
          - xfce
          - plasma
          - cinnamon
          - mate
          - all
      kernel:
        description: 'Kernel to use'
        required: true
        default: 'linux'
        type: choice
        options:
          - linux
          - linux-zen
          - linux-lts
          - linux-cachyos

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - id: set-matrix
        run: |
          if [ "${{ github.event.inputs.desktop }}" == "all" ]; then
            echo 'matrix=["xfce", "plasma", "cinnamon", "mate"]' >> $GITHUB_OUTPUT
          else
            echo 'matrix=["${{ github.event.inputs.desktop }}"]' >> $GITHUB_OUTPUT
          fi

  iso:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      matrix:
        desktop: ${{ fromJson(needs.prepare.outputs.matrix) }}
      fail-fast: false
    container:
      image: archlinux:latest
      options: --privileged

    steps:
      - uses: actions/checkout@v4

      - name: Clear Pacman Cache
        run: |
          rm -f /var/lib/pacman/db.lck
          rm -rf /var/lib/pacman/sync/*
          rm -rf /var/cache/pacman/pkg/*
          sed -i 's/SigLevel.*/SigLevel = Never/' /etc/pacman.conf

      - name: Setup Mirrorlist
        run: |
          cp pacman-mirrorlist /etc/pacman.d/mirrorlist
          cat /etc/pacman.d/mirrorlist

      - name: Sync Pacman
        run: |
          pacman-key --init
          pacman-key --populate archlinux
          pacman -Sy --noconfirm

      - name: Cache Pacman Packages
        uses: actions/cache@v4
        with:
          path: /var/cache/pacman/pkg
          key: ${{ runner.os }}-pacman-${{ matrix.desktop }}-${{ github.event.inputs.kernel }}-${{ hashFiles('packages.x86_64') }}
          restore-keys: |
            ${{ runner.os }}-pacman-

      - name: Setup Build Environment
        run: |
          pacman -S --noconfirm archiso grub mtools dosfstools libisoburn squashfs-tools git curl pv nbd mkinitcpio-nfs-utils zip jq

      - name: Add CachyOS Repository (for linux-cachyos)
        if: "${{ github.event.inputs.kernel == 'linux-cachyos' }}"
        run: |
          rm -rf /var/lib/pacman/sync/cachyos
          cat >> /etc/pacman.conf << 'EOF'
          
          # CachyOS Repository
          [cachyos]
          Server = https://mirror.cachyos.org/repo/x86_64/cachyos
          SigLevel = Never
          EOF
          pacman -Sy --noconfirm cachyos

      - name: Install Kernel
        run: |
          KERNEL_PKGS=""
          case "${{ github.event.inputs.kernel }}" in
            linux-cachyos) KERNEL_PKGS="linux-cachyos linux-cachyos-headers" ;;
            linux-zen) KERNEL_PKGS="linux-zen linux-zen-headers" ;;
            linux-lts) KERNEL_PKGS="linux-lts linux-lts-headers" ;;
            *) KERNEL_PKGS="linux linux-headers" ;;
          esac
          pacman -S --noconfirm $KERNEL_PKGS

      - name: Configure Kernel-Specific Settings
        run: |
          KERNEL="${{ github.event.inputs.kernel }}"
          
          echo "==> Kernel: $KERNEL"
          
          # Update packages.x86_64 - replace default kernel with selected one
          sed -i 's/^linux$/'"$KERNEL"'/' packages.x86_64
          sed -i 's/^linux-headers$/'"$KERNEL"'-headers/' packages.x86_64
          
          # Update profiledef.sh - ISO name and label
          sed -i "s/iso_name=\"archcosta\"/iso_name=\"archcosta-${{ matrix.desktop }}\"/" profiledef.sh
          UPPER_DE=$(echo "${{ matrix.desktop }}" | tr '[:lower:]' '[:upper:]')
          sed -i "s/ARCHCOSTA_/ARCHCOSTA_${UPPER_DE}_/" profiledef.sh
          
          # Copy kernel-specific bootloader configs
          cp syslinux/syslinux-${KERNEL}.cfg syslinux/syslinux.cfg
          cp efiboot/loader/entries/archcosta-${KERNEL}.conf efiboot/loader/entries/archcosta.conf
          
          echo "==> Updated packages.x86_64:"
          grep -E "^linux" packages.x86_64 || echo "No kernel found"

      - name: Build ISO
        run: |
          mkdir -p /tmp/out
          mkarchiso -v -w /tmp/work -o /tmp/out .

      - name: Display Build Results
        run: |
          ISO_FILE=$(ls /tmp/out/*.iso 2>/dev/null || echo "none")
          ISO_NAME=$(basename "$ISO_FILE" 2>/dev/null || echo "N/A")
          UPPER_DE=$(echo "${{ matrix.desktop }}" | tr '[:lower:]' '[:upper:]')
          KERNEL_NAME=$(echo "${{ github.event.inputs.kernel }}" | tr '[:lower:]' '[:upper:]')
          
          if [ -f "$ISO_FILE" ]; then
            echo "================================================================================"
            echo "✅ BUILD SUCCESSFUL!"
            echo "================================================================================"
            echo "Edition:     $UPPER_DE"
            echo "Kernel:      $KERNEL_NAME"
            echo "ISO Size:    $(du -h "$ISO_FILE" | cut -f1)"
            echo "ISO Path:    $ISO_FILE"
            echo "================================================================================"
            echo ""
            echo "📥 DOWNLOAD OPTIONS:"
            echo "   1. GitHub Actions Artifacts (fastest, expires with repo)"
            echo "   2. Run locally: gh run download"
            echo ""
            echo "💡 To download from Actions:"
            echo "   gh run view <run-id> --json artifacts --jq '.[].name'"
            echo "   gh run download <artifact-id>"
            echo "================================================================================"
          else
            echo "❌ ISO build failed - check build logs"
          fi

      - name: Upload to GitHub Release
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          files: /tmp/out/*.iso
          tag: iso-${{ matrix.desktop }}-${{ github.event.inputs.kernel }}-${{ github.run_number }}
          name: ArchCosta ${{ matrix.desktop }} ${{ github.event.inputs.kernel }} (Build #${{ github.run_number }})
          body: |
            ArchCosta OS - ${{ matrix.desktop }} Edition with ${{ github.event.inputs.kernel }} kernel
            
            **Build:** #${{ github.run_number }}
            **Kernel:** ${{ github.event.inputs.kernel }}
            **Desktop:** ${{ matrix.desktop }}
            **Date:** ${{ github.event.head_commit.timestamp }}
            
            Download this ISO and flash it to a USB drive using tools like:
            - balenaEtcher
            - Rufus
            - dd command
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload ISO artifact (GitHub)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: archcosta-${{ matrix.desktop }}-${{ github.event.inputs.kernel }}-iso
          path: /tmp/out/*.iso

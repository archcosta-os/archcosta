name: Build ISO

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 1 * *'   # Monthly ISO builds

permissions:
  contents: write

jobs:
  iso:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
      options: --privileged

    steps:
      - uses: actions/checkout@v4

      - name: Setup Build Environment
        run: |
          pacman-key --init
          pacman-key --populate archlinux
          pacman -Syu --noconfirm archiso grub mtools dosfstools libisoburn squashfs-tools git curl pv nbd mkinitcpio-nfs-utils zip jq github-cli

      - name: Build ISO
        run: |
          mkdir -p /tmp/out
          mkarchiso -v -w /tmp/work -o /tmp/out profile/

      - name: Prepare Artifacts
        run: |
          cd /tmp/out
          if ls *.iso 1> /dev/null 2>&1; then
            zip archcosta-spark.zip *.iso
          else
            echo "No ISO file found!"
            exit 1
          fi

      - name: Create GitHub Pre-release
        if: success()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG_NAME="spark-$(date +'%Y.%m.%d-%H%M')"
          ISO_FILE=$(ls /tmp/out/*.iso | head -n 1)
          
          echo "Creating pre-release $TAG_NAME..."
          gh release create "$TAG_NAME" "$ISO_FILE" \
            --prerelease \
            --title "ArchCosta Spark Build ($TAG_NAME)" \
            --notes "Automated development build of ArchCosta Spark. This is a pre-release version."

      - name: Upload ISO artifact (Internal)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: archcosta-spark-zip
          path: /tmp/out/archcosta-spark.zip
          retention-days: 7

      - name: Display Download Links
        run: |
          echo "--------------------------------------------------------------------------------"
          echo "🚀 DOWNLOAD LINKS:"
          echo ""
          echo "GitHub Release (Permanent & Public):"
          echo "https://github.com/${{ github.repository }}/releases"
          echo ""
          echo "Direct Proxy (No Login Required):"
          echo "https://nightly.link/${{ github.repository }}/workflows/build-iso/main/archcosta-spark-zip.zip"
          echo "--------------------------------------------------------------------------------"

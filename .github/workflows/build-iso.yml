name: Build ISO

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 1 * *'   # Monthly ISO builds

jobs:
  iso:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
      options: --privileged

    steps:
      - uses: actions/checkout@v4

      - name: Setup Build Environment
        run: |
          pacman-key --init
          pacman-key --populate archlinux
          pacman -Syu --noconfirm archiso grub mtools dosfstools libisoburn squashfs-tools git curl pv nbd mkinitcpio-nfs-utils zip

      - name: Build ISO
        run: |
          mkdir -p /tmp/out
          mkarchiso -v -w /tmp/work -o /tmp/out profile/

      - name: Prepare Public Artifact
        run: |
          cd /tmp/out
          # Create a consistent zip name for public download
          zip archcosta-spark-iso.zip *.iso

      - name: Upload ISO artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: archcosta-iso
          path: /tmp/out/archcosta-spark-iso.zip

      - name: Display Public Download Links
        run: |
          echo "--------------------------------------------------------------------------------"
          echo "🚀 PUBLIC DOWNLOAD LINKS (No Login Required):"
          echo ""
          echo "Primary Link:"
          echo "https://nightly.link/${{ github.repository }}/workflows/build-iso/main/archcosta-iso.zip"
          echo ""
          echo "Alternative Link (Workflow Name):"
          echo "https://nightly.link/${{ github.repository }}/workflows/Build%20ISO/main/archcosta-iso.zip"
          echo ""
          echo "GitHub Actions Page (Requires Login but 100% Reliable):"
          echo "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          echo "--------------------------------------------------------------------------------"

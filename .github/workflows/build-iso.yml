name: Build ISO

on:
  workflow_dispatch:
    inputs:
      desktop:
        description: 'Desktop Environment to build'
        required: true
        default: 'xfce'
        type: choice
        options:
          - xfce
          - plasma
          - cinnamon
          - mate
          - all
      kernel:
        description: 'Kernel to use'
        required: true
        default: 'linux'
        type: choice
        options:
          - linux
          - linux-zen
          - linux-lts
          - linux-cachyos

env:
  SOURCEFORGE_PROJECT: archcosta

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - id: set-matrix
        run: |
          if [ "${{ github.event.inputs.desktop }}" == "all" ]; then
            echo 'matrix=["xfce", "plasma", "cinnamon", "mate"]' >> $GITHUB_OUTPUT
          else
            echo 'matrix=["${{ github.event.inputs.desktop }}"]' >> $GITHUB_OUTPUT
          fi

  iso:
    name: Build ISO
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      matrix:
        desktop: ${{ fromJson(needs.prepare.outputs.matrix) }}
      fail-fast: false
    container:
      image: archlinux:latest
      options: --privileged

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Clear All Caches
        run: |
          rm -f /var/lib/pacman/db.lck
          rm -rf /var/lib/pacman/sync/*
          rm -rf /var/cache/pacman/pkg/*
          rm -rf /tmp/work /tmp/out
          rm -rf /root/.ccache
          rm -rf /root/.cache
          rm -rf build-cache
          find /root -name "*.pyc" -delete 2>/dev/null || true
          sed -i 's/SigLevel.*/SigLevel = Never/' /etc/pacman.conf

      - name: Setup Mirrorlist
        run: |
          cp pacman-mirrorlist /etc/pacman.d/mirrorlist

      - name: Sync Pacman
        run: |
          pacman-key --init
          pacman-key --populate archlinux
          pacman -Sy --noconfirm

      - name: Setup Build Environment
        run: |
          pacman -S --noconfirm archiso dracut mtools dosfstools libisoburn squashfs-tools git curl pv nbd zip jq openssh rsync p7zip

      - name: Add CachyOS Repository (for linux-cachyos)
        if: "${{ github.event.inputs.kernel == 'linux-cachyos' }}"
        run: |
          rm -rf /var/lib/pacman/sync/cachyos
          cat >> /etc/pacman.conf << 'EOF'
          
          # CachyOS Repository
          [cachyos]
          SigLevel = Optional TrustAll
          Server = https://mirror.cachyos.org/repo/$arch/cachyos
          EOF
          pacman -Sy --noconfirm

      - name: Configure Kernel-Specific Settings
        run: |
          KERNEL="${{ github.event.inputs.kernel }}"
          DESKTOP="${{ matrix.desktop }}"
          
          echo "==> Kernel: $KERNEL"
          echo "==> Desktop: $DESKTOP"
          
          sed -i 's/^linux$/'"$KERNEL"'/' packages.x86_64
          sed -i 's/^linux-headers$/'"$KERNEL"'-headers/' packages.x86_64
          
          sed -i "s/iso_name=\"archcosta\"/iso_name=\"archcosta-${DESKTOP}\"/" profiledef.sh
          UPPER_DE=$(echo "${DESKTOP}" | tr '[:lower:]' '[:upper:]')
          sed -i "s/ARCHCOSTA_/ARCHCOSTA_${UPPER_DE}_/" profiledef.sh
          
          cp syslinux/syslinux-${KERNEL}.cfg syslinux/syslinux.cfg
          cp efiboot/loader/entries/archcosta-${KERNEL}.conf efiboot/loader/entries/archcosta.conf
          
          # Add the selected desktop environment package
          echo "archcosta-${DESKTOP}" >> packages.x86_64
          
          echo "==> Updated packages.x86_64:"
          grep -E "^linux" packages.x86_64 || echo "No kernel found"
          tail -n 5 packages.x86_64

      - name: Install Kernel
        run: |
          KERNEL_PKGS=""
          case "${{ github.event.inputs.kernel }}" in
            linux-cachyos) KERNEL_PKGS="linux-cachyos linux-cachyos-headers" ;;
            linux-zen) KERNEL_PKGS="linux-zen linux-zen-headers" ;;
            linux-lts) KERNEL_PKGS="linux-lts linux-lts-headers" ;;
            *) KERNEL_PKGS="linux linux-headers" ;;
          esac
          pacman -S --noconfirm $KERNEL_PKGS

      - name: Build ISO
        run: |
          mkdir -p /tmp/out
          mkarchiso -v -w /tmp/work -o /tmp/out .

      - name: Generate SHA256 Hash
        run: |
          ISO_FILE=$(ls /tmp/out/*.iso)
          sha256sum "$ISO_FILE" > "${ISO_FILE}.sha256"
          cat "${ISO_FILE}.sha256"

      - name: Compress ISO (for GitHub Release limit)
        run: |
          ISO_FILE=$(ls /tmp/out/*.iso)
          7z a -mx=3 "${ISO_FILE}.7z" "$ISO_FILE"

      - name: Upload ISO artifact (GitHub)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: archcosta-${{ matrix.desktop }}-${{ github.event.inputs.kernel }}-iso
          path: |
            /tmp/out/*.iso
            /tmp/out/*.7z

      - name: Create Release
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: rolling
          name: "ArchCosta Rolling Release"
          body: |
            ArchCosta Automated ISO Builds
            
            Kernel: ${{ github.event.inputs.kernel }}
            Build Date: ${{ github.event.repository.updated_at }}
            
            **Note:** The ISO is compressed in .7z format to stay within GitHub's file size limits.
          prerelease: true
          overwrite: true
          files: |
            /tmp/out/*.7z
            /tmp/out/*.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

name: Build ISO

on:
  workflow_dispatch:
    inputs:
      desktop:
        description: 'Desktop Environment to build'
        required: true
        default: 'xfce'
        type: choice
        options:
          - xfce
          - plasma
          - cinnamon
          - mate
          - all
      kernel:
        description: 'Kernel to use'
        required: true
        default: 'linux'
        type: choice
        options:
          - linux
          - linux-zen
          - linux-lts
          - linux-cachyos

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - id: set-matrix
        run: |
          if [ "${{ github.event.inputs.desktop }}" == "all" ]; then
            echo 'matrix=["xfce", "plasma", "cinnamon", "mate"]' >> $GITHUB_OUTPUT
          else
            echo 'matrix=["${{ github.event.inputs.desktop }}"]' >> $GITHUB_OUTPUT
          fi

  iso:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      matrix:
        desktop: ${{ fromJson(needs.prepare.outputs.matrix) }}
      fail-fast: false
    container:
      image: archlinux:latest
      options: --privileged

    steps:
      - uses: actions/checkout@v4

      - name: Setup Mirrorlist First
        run: |
          cp pacman-mirrorlist /etc/pacman.d/mirrorlist
          rm -f /var/lib/pacman/db.lck
          rm -rf /var/lib/pacman/sync/*
          rm -rf /var/cache/pacman/pkg/*
          cat /etc/pacman.d/mirrorlist

      - name: Setup Build Environment
        run: |
          pacman-key --init
          pacman-key --populate archlinux
          pacman -Sy --noconfirm
          pacman -S --noconfirm --ignore gcc,clang,llvm,compiler-rt,lld,llvm-libs,libisl,libmpc,libedit,diffutils,pahole archiso grub mtools dosfstools libisoburn squashfs-tools git curl pv nbd mkinitcpio-nfs-utils zip jq || true

      - name: Cache Pacman Packages
        uses: actions/cache@v4
        with:
          path: /var/cache/pacman/pkg
          key: ${{ runner.os }}-pacman-${{ matrix.desktop }}-${{ github.event.inputs.kernel }}-${{ hashFiles('packages.x86_64') }}
          restore-keys: |
            ${{ runner.os }}-pacman-

      - name: Add CachyOS Repository (for linux-cachyos)
        if: "${{ github.event.inputs.kernel == 'linux-cachyos' }}"
        run: |
          cat >> /etc/pacman.conf << 'EOF'
          
          # CachyOS Repository
          [cachyos]
          Server = https://mirror.cachyos.org/repo/x86_64/cachyos
          SigLevel = Never
          EOF
          pacman -Sy --noconfirm

      - name: Install Kernel
        run: |
          pacman -S --noconfirm --skippgpcheck $(
            case "${{ github.event.inputs.kernel }}" in
              linux-cachyos) echo "linux-cachyos linux-cachyos-headers" ;;
              linux-zen) echo "linux-zen linux-zen-headers" ;;
              linux-lts) echo "linux-lts linux-lts-headers" ;;
              *) echo "linux linux-headers" ;;
            esac
          )

      - name: Configure Kernel-Specific Settings
        run: |
          KERNEL="${{ github.event.inputs.kernel }}"
          
          # Set kernel names for file replacements
          case "$KERNEL" in
            linux-zen)
              VMLINUZ="vmlinuz-linux-zen"
              INITRAMFS="initramfs-linux-zen.img"
              ;;
            linux-lts)
              VMLINUZ="vmlinuz-linux-lts"
              INITRAMFS="initramfs-linux-lts.img"
              ;;
            linux-cachyos)
              VMLINUZ="vmlinuz-linux-cachyos"
              INITRAMFS="initramfs-linux-cachyos.img"
              ;;
            *)
              VMLINUZ="vmlinuz-linux"
              INITRAMFS="initramfs-linux.img"
              ;;
          esac
          
          echo "==> Kernel: $KERNEL"
          echo "==> VMLinuz: $VMLINUZ"
          echo "==> Initramfs: $INITRAMFS"
          
          # Update packages.x86_64 - replace default kernel with selected one
          sed -i 's/^linux$/'"$KERNEL"'/' packages.x86_64
          sed -i 's/^linux-headers$/'"$KERNEL"'-headers/' packages.x86_64
          
          # Update profiledef.sh - ISO name and label
          sed -i "s/iso_name=\"archcosta\"/iso_name=\"archcosta-${{ matrix.desktop }}\"/" profiledef.sh
          UPPER_DE=$(echo "${{ matrix.desktop }}" | tr '[:lower:]' '[:upper:]')
          sed -i "s/ARCHCOSTA_/ARCHCOSTA_${UPPER_DE}_/" profiledef.sh
          
          # Update syslinux/syslinux.cfg - kernel file names
          sed -i "s/vmlinuz-linux/$VMLINUZ/g" syslinux/syslinux.cfg
          sed -i "s/initramfs-linux.img/$INITRAMFS/g" syslinux/syslinux.cfg
          
          # Update efiboot entries - kernel file names
          sed -i "s|vmlinuz-linux|$VMLINUZ|g" efiboot/loader/entries/archcosta.conf
          sed -i "s|initramfs-linux.img|$INITRAMFS|g" efiboot/loader/entries/archcosta.conf
          sed -i "s|vmlinuz-linux|$VMLINUZ|g" efiboot/loader/entries/archcosta-accessibility.conf
          sed -i "s|initramfs-linux.img|$INITRAMFS|g" efiboot/loader/entries/archcosta-accessibility.conf
          
          # Remove other desktop meta-packages
          DESKTOPS=("archcosta-xfce" "archcosta-plasma" "archcosta-cinnamon" "archcosta-mate")
          CURRENT="archcosta-${{ matrix.desktop }}"
          for d in "${DESKTOPS[@]}"; do
            if [ "$d" != "$CURRENT" ]; then
              sed -i "/$d/d" packages.x86_64
            fi
          done
          
          echo "==> Updated packages.x86_64:"
          grep -E "^linux" packages.x86_64 || echo "No kernel found"

      - name: Build ISO
        run: |
          mkdir -p /tmp/out
          mkarchiso -v -w /tmp/work -o /tmp/out .

      - name: Upload to catbox.moe (Public Download)
        run: |
          ISO_FILE=$(ls /tmp/out/*.iso)
          ISO_NAME=$(basename "$ISO_FILE")
          FILE_SIZE=$(stat -c%s "$ISO_FILE")
          UPPER_DE=$(echo "${{ matrix.desktop }}" | tr '[:lower:]' '[:upper:]')
          KERNEL_NAME=$(echo "${{ github.event.inputs.kernel }}" | tr '[:lower:]' '[:upper:]')
          
          echo "==> ISO Size: $(du -h "$ISO_FILE" | cut -f1)"
          echo "==> Uploading $ISO_NAME to catbox.moe (may take a few minutes)..."
          
          RESPONSE=$(curl --connect-timeout 30 --max-time 600 -s -F "reqtype=fileupload" -F "fileToUpload=@${ISO_FILE}" https://catbox.moe/user/api.php)
          
          if echo "$RESPONSE" | grep -q "^https://"; then
            echo "--------------------------------------------------------------------------------"
            echo "🚀 PUBLIC DOWNLOAD LINK ($UPPER_DE / $KERNEL_NAME):"
            echo "$RESPONSE"
            echo "--------------------------------------------------------------------------------"
          else
            echo "::warning::catbox.moe upload failed. Response: $RESPONSE"
          fi

      - name: Upload ISO artifact (GitHub)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: archcosta-${{ matrix.desktop }}-${{ github.event.inputs.kernel }}-iso
          path: /tmp/out/*.iso

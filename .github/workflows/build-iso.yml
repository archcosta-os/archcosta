          rm -rf /var/cache/pacman/pkg/*
          rm -rf /tmp/work /tmp/out
          rm -rf /root/.ccache
          rm -rf /root/.cache
          rm -rf build-cache
          find /root -name "*.pyc" -delete 2>/dev/null || true
          sed -i 's/SigLevel.*/SigLevel = Never/' /etc/pacman.conf

      - name: Setup Mirrorlist
        run: |
          cp pacman-mirrorlist /etc/pacman.d/mirrorlist

      - name: Sync Pacman
        run: |
          pacman-key --init
          pacman-key --populate archlinux
          pacman -Sy --noconfirm

      - name: Setup Build Environment
        run: |
          pacman -S --noconfirm archiso grub mtools dosfstools libisoburn squashfs-tools git curl pv nbd mkinitcpio-nfs-utils zip jq openssh rsync

      - name: Add CachyOS Repository (for linux-cachyos)
        if: "${{ github.event.inputs.kernel == 'linux-cachyos' }}"
        run: |
          rm -rf /var/lib/pacman/sync/cachyos
          cat >> /etc/pacman.conf << 'EOF'
          

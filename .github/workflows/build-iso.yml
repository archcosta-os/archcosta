name: Build ISO

on:
  workflow_dispatch:
    inputs:
      desktop:
        description: 'Desktop Environment to build'
        required: true
        default: 'xfce'
        type: choice
        options:
          - xfce
          - plasma
          - cinnamon
          - mate
          - all
      kernel:
        description: 'Kernel to use'
        required: true
        default: 'linux'
        type: choice
        options:
          - linux
          - linux-zen
          - linux-lts
          - linux-cachyos
      upload_release:
        description: 'Upload to GitHub Release'
        required: false
        default: 'false'
        type: boolean

env:
  SOURCEFORGE_PROJECT: archcosta

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - id: set-matrix
        run: |
          if [ "${{ github.event.inputs.desktop }}" == "all" ]; then
            echo 'matrix=["xfce", "plasma", "cinnamon", "mate"]' >> $GITHUB_OUTPUT
          else
            echo 'matrix=["${{ github.event.inputs.desktop }}"]' >> $GITHUB_OUTPUT
          fi

  iso:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      matrix:
        desktop: ${{ fromJson(needs.prepare.outputs.matrix) }}
      fail-fast: false
    container:
      image: archlinux:latest
      options: --privileged

    steps:
      - name: Set up environment for actions
        run: |
          echo "FORCE_JAVASCRIPT_ACTIONS_TO_NODE24=true" >> $GITHUB_ENV

      - uses: actions/checkout@v4

      - name: Clear Pacman Cache
        run: |
          rm -f /var/lib/pacman/db.lck
          rm -rf /var/lib/pacman/sync/*
          rm -rf /var/cache/pacman/pkg/*
          sed -i 's/SigLevel.*/SigLevel = Never/' /etc/pacman.conf

      - name: Setup Mirrorlist
        run: |
          cp pacman-mirrorlist /etc/pacman.d/mirrorlist

      - name: Sync Pacman
        run: |
          pacman-key --init
          pacman-key --populate archlinux
          pacman -Sy --noconfirm

      - name: Setup Build Environment
        run: |
          pacman -S --noconfirm archiso mkinitcpio-archiso grub mtools dosfstools libisoburn squashfs-tools git curl pv nbd mkinitcpio-nfs-utils zip jq openssh rsync syslinux

      - name: Add CachyOS Repository (for linux-cachyos)
        if: "${{ github.event.inputs.kernel == 'linux-cachyos' }}"
        run: |
          rm -rf /var/lib/pacman/sync/cachyos
          cat >> /etc/pacman.conf << 'EOF'
          
          # CachyOS Repository
          [cachyos]
          SigLevel = Optional TrustAll
          Server = https://mirror.cachyos.org/repo/$arch/cachyos
          EOF
          pacman -Sy --noconfirm

      - name: Configure Kernel-Specific Settings
        run: |
          KERNEL="${{ github.event.inputs.kernel }}"
          
          echo "==> Kernel: $KERNEL"
          
          # Update packages.x86_64 FIRST (before installing kernel)
          sed -i 's/^linux$/'"$KERNEL"'/' packages.x86_64
          sed -i 's/^linux-headers$/'"$KERNEL"'-headers/' packages.x86_64
          
          # Update profiledef.sh
          sed -i "s/iso_name=\"archcosta\"/iso_name=\"archcosta-${{ matrix.desktop }}\"/" profiledef.sh
          UPPER_DE=$(echo "${{ matrix.desktop }}" | tr '[:lower:]' '[:upper:]')
          sed -i "s/ARCHCOSTA_/ARCHCOSTA_${UPPER_DE}_/" profiledef.sh
          
          # Copy kernel-specific bootloader configs
          cp syslinux/syslinux-${KERNEL}.cfg syslinux/syslinux.cfg
          cp efiboot/loader/entries/archcosta-${KERNEL}.conf efiboot/loader/entries/archcosta.conf
          
          echo "==> Updated packages.x86_64:"
          grep -E "^linux" packages.x86_64 || echo "No kernel found"

      - name: Install Kernel
        run: |
          KERNEL_PKGS=""
          case "${{ github.event.inputs.kernel }}" in
            linux-cachyos) KERNEL_PKGS="linux-cachyos linux-cachyos-headers" ;;
            linux-zen) KERNEL_PKGS="linux-zen linux-zen-headers" ;;
            linux-lts) KERNEL_PKGS="linux-lts linux-lts-headers" ;;
            *) KERNEL_PKGS="linux linux-headers" ;;
          esac
          pacman -S --noconfirm $KERNEL_PKGS
          
          # Copy vconsole.conf before rebuilding initramfs (needed for sd-vconsole hook)
          echo "==> Setting up vconsole.conf..."
          cp airootfs/etc/vconsole.conf /etc/vconsole.conf
          
          # Rebuild initramfs with archiso hook for live boot
          echo "==> Rebuilding initramfs with archiso hook..."
          cp mkinitcpio.conf /etc/mkinitcpio.conf
          mkinitcpio -P

      - name: Build ISO
        run: |
          echo "==> packages.x86_64 kernel entries:"
          grep -E "^linux" packages.x86_64
          
          echo "==> Verifying kernel installation:"
          ls -la /boot/vmlinuz-* /boot/initramfs-*.img 2>/dev/null || echo "No kernel files found"
          
          mkdir -p /tmp/out
          mkarchiso -v -w /tmp/work -o /tmp/out .

      - name: Generate Hashes
        run: |
          ISO_FILE=$(ls /tmp/out/*.iso)
          echo "==> Generating hash files for $(basename "$ISO_FILE")"
          sha256sum "$ISO_FILE" > "${ISO_FILE}.sha256"
          sha512sum "$ISO_FILE" > "${ISO_FILE}.sha512"
          cat "${ISO_FILE}.sha256"

      - name: Setup SSH for SourceForge
        id: setup-ssh
        run: |
          if [ -z "${{ secrets.SOURCEFORGE_SSH_KEY }}" ]; then
            echo "SOURCEFORGE_SSH_KEY not set, skipping SourceForge upload"
            echo "skip_upload=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          echo "skip_upload=false" >> $GITHUB_OUTPUT
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "$SOURCEFORGE_SSH_KEY" | base64 -d > ~/.ssh/sourceforge_key
          chmod 600 ~/.ssh/sourceforge_key
          ssh-keyscan frs.sourceforge.net >> ~/.ssh/known_hosts
        env:
          SOURCEFORGE_SSH_KEY: ${{ secrets.SOURCEFORGE_SSH_KEY }}

      - name: Upload to SourceForge
        if: steps.setup-ssh.outputs.skip_upload != 'true' && success()
        env:
          SOURCEFORGE_SSH_KEY: ${{ secrets.SOURCEFORGE_SSH_KEY }}
          SOURCEFORGE_USER: ${{ secrets.SOURCEFORGE_USERNAME }}
        run: |
          ISO_FILE=$(ls /tmp/out/*.iso)
          ISO_NAME=$(basename "$ISO_FILE")
          DEST_DIR="/home/frs/project/$SOURCEFORGE_PROJECT/${{ matrix.desktop }}-${{ github.event.inputs.kernel }}"
          
          echo "==> Uploading $ISO_NAME to SourceForge..."
          
          # Create remote directory
          ssh -i ~/.ssh/sourceforge_key -o StrictHostKeyChecking=no -o IdentitiesOnly=yes \
            "$SOURCEFORGE_USER@frs.sourceforge.net" \
            "mkdir -p $DEST_DIR" || true
          
          # Upload ISO and hash files
          rsync -avz --progress --partial \
            -e "ssh -i ~/.ssh/sourceforge_key -o StrictHostKeyChecking=no -o IdentitiesOnly=yes" \
            "$ISO_FILE" \
            "${ISO_FILE}.sha256" \
            "${ISO_FILE}.sha512" \
            "$SOURCEFORGE_USER@frs.sourceforge.net:$DEST_DIR/"
          
          echo "==> Upload complete!"

      - name: Upload to GitHub Release
        if: github.event.inputs.upload_release == 'true' && success()
        run: |
          ISO_FILE=$(ls /tmp/out/*.iso)
          ISO_NAME=$(basename "$ISO_FILE")
          TAG_NAME="${{ matrix.desktop }}-${{ github.event.inputs.kernel }}-latest"
          
          echo "==> Creating GitHub release $TAG_NAME..."
          
          # Create release if not exists
          gh release create "$TAG_NAME" \
            --title "ArchCosta ${{ matrix.desktop }} (${{ github.event.inputs.kernel }})" \
            --notes "Automated build - $(date)" \
            --generate-notes || true
          
          # Upload ISO and hash files
          gh release upload "$TAG_NAME" "$ISO_FILE" \
            "${ISO_FILE}.sha256" \
            "${ISO_FILE}.sha512" \
            --clobber
          
          echo "==> GitHub release upload complete!"

      - name: Display Build Results
        if: failure()
        run: |
          echo "================================================================================"
          echo "❌ ISO build failed - check build logs above"
          echo "================================================================================"
          echo ""
          echo "💡 Make sure to set SOURCEFORGE_SSH_KEY secret in repository settings"
          echo "   Repository Settings → Secrets and variables → Actions → New repository secret"
          echo "   Name: SOURCEFORGE_SSH_KEY"
          echo "   Value: Your SourceForge SSH private key (base64 encoded)"
          echo "================================================================================"

      - name: Upload ISO artifact (GitHub)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: archcosta-${{ matrix.desktop }}-${{ github.event.inputs.kernel }}-iso
          path: /tmp/out/*.iso
          retention-days: 30

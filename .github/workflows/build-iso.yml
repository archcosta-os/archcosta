name: Build ISO

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 1 * *'   # Monthly ISO builds

jobs:
  iso:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
      options: --privileged

    steps:
      - uses: actions/checkout@v4

      - name: Setup Build Environment
        run: |
          # Initialize pacman keyring for the host to allow installing dependencies
          pacman-key --init
          pacman-key --populate archlinux
          
          # Update and install build dependencies from official Arch repos
          pacman -Syu --noconfirm archiso grub mtools dosfstools libisoburn squashfs-tools git curl

      - name: Build ISO
        run: |
          # Create output directory
          mkdir -p /tmp/out
          
          # Build the ISO using the profile
          # Note: SigLevel is set to Optional TrustAll in profile/pacman.conf to bypass GPG issues in CI
          mkarchiso -v -w /tmp/work -o /tmp/out profile/

      - name: Upload ISO artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: archcosta-iso
          path: /tmp/out/*.iso
name: Build ISO

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 1 * *'   # Monthly ISO builds

jobs:
  iso:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
      options: --privileged

    steps:
      - uses: actions/checkout@v4

      - name: Setup Build Environment
        run: |
          pacman-key --init
          pacman-key --populate archlinux
          pacman -Syu --noconfirm archiso grub mtools dosfstools libisoburn squashfs-tools git curl pv nbd mkinitcpio-nfs-utils zip jq

      - name: Build ISO
        run: |
          mkdir -p /tmp/out
          mkarchiso -v -w /tmp/work -o /tmp/out profile/

      - name: Upload to PixelDrain (Public Download)
        env:
          PIXELDRAIN_API_KEY: ${{ secrets.PIXELDRAIN_API_KEY }}
        run: |
          ISO_FILE=$(ls /tmp/out/*.iso)
          ISO_NAME=$(basename "$ISO_FILE")
          
          echo "Uploading $ISO_NAME to PixelDrain..."
          
          # Upload and capture response
          RESPONSE=$(curl -s -u ":$PIXELDRAIN_API_KEY" -T "$ISO_FILE" https://pixeldrain.com/api/file/)
          
          # Parse file ID using jq
          FILE_ID=$(echo "$RESPONSE" | jq -r '.id')
          
          if [ "$FILE_ID" != "null" ]; then
            echo "--------------------------------------------------------------------------------"
            echo "🚀 PUBLIC DOWNLOAD LINK (No Login Required):"
            echo "https://pixeldrain.com/u/$FILE_ID"
            echo "--------------------------------------------------------------------------------"
          else
            echo "::warning::PixelDrain upload failed. Response: $RESPONSE"
          fi

      - name: Upload ISO artifact (GitHub)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: archcosta-iso
          path: /tmp/out/*.iso

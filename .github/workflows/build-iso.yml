name: Build ISO

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 1 * *'   # Monthly ISO builds

jobs:
  iso:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
      options: --privileged

    steps:
      - uses: actions/checkout@v4

      - name: Setup Build Environment
        run: |
          pacman-key --init
          pacman-key --populate archlinux
          pacman -Syu --noconfirm archiso grub mtools dosfstools libisoburn squashfs-tools git curl pv nbd mkinitcpio-nfs-utils zip jq

      - name: Build ISO
        run: |
          mkdir -p /tmp/out
          mkarchiso -v -w /tmp/work -o /tmp/out profile/

      - name: Prepare Public Artifact
        run: |
          cd /tmp/out
          # Explicitly zip the ISO for public download compatibility
          if ls *.iso 1> /dev/null 2>&1; then
            zip archcosta-spark.zip *.iso
          else
            echo "No ISO file found to zip!"
            exit 1
          fi

      - name: Upload ISO artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: archcosta-spark-zip
          path: /tmp/out/archcosta-spark.zip
          retention-days: 7

      - name: Generate Backup Public Link (Gofile)
        if: success()
        continue-on-error: true
        run: |
          echo "Uploading to Gofile..."
          ISO_PATH=$(ls /tmp/out/*.iso | head -n 1)
          
          if [ -z "$ISO_PATH" ]; then
            echo "No ISO found, skipping Gofile upload."
            exit 0
          fi
          
          # Try to get best server
          SERVER_DATA=$(curl -s -m 15 -H "User-Agent: Mozilla/5.0" https://api.gofile.io/getServer)
          SERVER=$(echo "$SERVER_DATA" | jq -r '.data.server' 2>/dev/null)
          
          if [ -z "$SERVER" ] || [ "$SERVER" == "null" ]; then
            echo "API failed, using fallback server store1"
            SERVER="store1"
          fi
          
          echo "Using server: $SERVER"
          
          # Upload file
          RESPONSE=$(curl -m 600 -H "User-Agent: Mozilla/5.0" -X POST "https://${SERVER}.gofile.io/uploadFile" \
              -F "file=@${ISO_PATH}")
          
          # Extract download page URL
          DOWNLOAD_URL=$(echo "$RESPONSE" | jq -r '.data.downloadPage' 2>/dev/null)
          
          if [ -n "$DOWNLOAD_URL" ] && [ "$DOWNLOAD_URL" != "null" ]; then
              echo "BACKUP_LINK=$DOWNLOAD_URL" >> $GITHUB_ENV
              echo "Successfully uploaded to Gofile: $DOWNLOAD_URL"
          else
              echo "BACKUP_LINK=Gofile upload failed" >> $GITHUB_ENV
              echo "Gofile response: $RESPONSE"
          fi

      - name: Display Public Download Links
        run: |
          echo "--------------------------------------------------------------------------------"
          echo "🚀 PUBLIC DOWNLOAD LINKS (No Login Required):"
          echo ""
          echo "Primary Link (Powered by nightly.link):"
          echo "https://nightly.link/${{ github.repository }}/workflows/build-iso/main/archcosta-spark-zip.zip"
          echo ""
          echo "Backup Link (Powered by Gofile.io):"
          echo "${{ env.BACKUP_LINK || 'Upload failed or skipped' }}"
          echo ""
          echo "GitHub Actions Page (Requires Login):"
          echo "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          echo "--------------------------------------------------------------------------------"

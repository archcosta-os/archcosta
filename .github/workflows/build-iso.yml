name: Build ISO

on:
  workflow_dispatch:
    inputs:
      desktop:
        description: 'Desktop Environment to build'
        required: true
        default: 'xfce'
        type: choice
        options:
          - xfce
          - plasma
          - cinnamon
          - mate
          - all
      kernel:
        description: 'Kernel to use'
        required: true
        default: 'linux'
        type: choice
        options:
          - linux
          - linux-zen
          - linux-lts
          - linux-cachyos

env:
  SOURCEFORGE_PROJECT: archcosta  # CHANGE THIS to your SourceForge project name

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - id: set-matrix
        run: |
          if [ "${{ github.event.inputs.desktop }}" == "all" ]; then
            echo 'matrix=["xfce", "plasma", "cinnamon", "mate"]' >> $GITHUB_OUTPUT
          else
            echo 'matrix=["${{ github.event.inputs.desktop }}"]' >> $GITHUB_OUTPUT
          fi

  iso:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      matrix:
        desktop: ${{ fromJson(needs.prepare.outputs.matrix) }}
      fail-fast: false
    container:
      image: archlinux:latest
      options: --privileged

    steps:
      - uses: actions/checkout@v4

      - name: Clear Pacman Cache
        run: |
          rm -f /var/lib/pacman/db.lck
          rm -rf /var/lib/pacman/sync/*
          rm -rf /var/cache/pacman/pkg/*
          sed -i 's/SigLevel.*/SigLevel = Never/' /etc/pacman.conf

      - name: Setup Mirrorlist
        run: |
          cp pacman-mirrorlist /etc/pacman.d/mirrorlist

      - name: Sync Pacman
        run: |
          pacman-key --init
          pacman-key --populate archlinux
          pacman -Sy --noconfirm

      - name: Setup Build Environment
        run: |
          pacman -S --noconfirm archiso grub mtools dosfstools libisoburn squashfs-tools git curl pv nbd mkinitcpio-nfs-utils zip jq openssh rsync

      - name: Add CachyOS Repository (for linux-cachyos)
        if: "${{ github.event.inputs.kernel == 'linux-cachyos' }}"
        run: |
          rm -rf /var/lib/pacman/sync/cachyos
          cat >> /etc/pacman.conf << 'EOF'
          
          # CachyOS Repository
          [cachyos]
          SigLevel = Optional TrustAll
          Server = https://mirror.cachyos.org/repo/$arch/cachyos
          EOF
          pacman -Sy --noconfirm

      - name: Configure Kernel-Specific Settings
        run: |
          KERNEL="${{ github.event.inputs.kernel }}"
          
          echo "==> Kernel: $KERNEL"
          
          # Update packages.x86_64 FIRST (before installing kernel)
          sed -i 's/^linux$/'"$KERNEL"'/' packages.x86_64
          sed -i 's/^linux-headers$/'"$KERNEL"'-headers/' packages.x86_64
          
          # Update profiledef.sh
          sed -i "s/iso_name=\"archcosta\"/iso_name=\"archcosta-${{ matrix.desktop }}\"/" profiledef.sh
          UPPER_DE=$(echo "${{ matrix.desktop }}" | tr '[:lower:]' '[:upper:]')
          sed -i "s/ARCHCOSTA_/ARCHCOSTA_${UPPER_DE}_/" profiledef.sh
          
          # Copy kernel-specific bootloader configs
          cp syslinux/syslinux-${KERNEL}.cfg syslinux/syslinux.cfg
          cp efiboot/loader/entries/archcosta-${KERNEL}.conf efiboot/loader/entries/archcosta.conf
          
          echo "==> Updated packages.x86_64:"
          grep -E "^linux" packages.x86_64 || echo "No kernel found"

      - name: Install Kernel
        run: |
          KERNEL_PKGS=""
          case "${{ github.event.inputs.kernel }}" in
            linux-cachyos) KERNEL_PKGS="linux-cachyos linux-cachyos-headers" ;;
            linux-zen) KERNEL_PKGS="linux-zen linux-zen-headers" ;;
            linux-lts) KERNEL_PKGS="linux-lts linux-lts-headers" ;;
            *) KERNEL_PKGS="linux linux-headers" ;;
          esac
          pacman -S --noconfirm $KERNEL_PKGS

      - name: Build ISO
        run: |
          echo "==> packages.x86_64 kernel entries:"
          grep -E "^linux" packages.x86_64
          
          echo "==> Verifying kernel installation:"
          ls -la /boot/vmlinuz-* /boot/initramfs-*.img 2>/dev/null || echo "No kernel files found"
          
          mkdir -p /tmp/out
          mkarchiso -v -w /tmp/work -o /tmp/out .

      - name: Generate SHA256 Hash
        run: |
          ISO_FILE=$(ls /tmp/out/*.iso)
          sha256sum "$ISO_FILE" > "${ISO_FILE}.sha256"
          cat "${ISO_FILE}.sha256"

      - name: Upload to SourceForge
        if: success()
        run: |
          ISO_FILE=$(ls /tmp/out/*.iso)
          SHA256_FILE="${ISO_FILE}.sha256"

          echo "==> ISO File: $(basename "$ISO_FILE")"

          mkdir -p ~/.ssh

          # Add host
          ssh-keyscan frs.sourceforge.net >> ~/.ssh/known_hosts

          # Write key (IMPORTANT - decode base64)
          echo "$SOURCEFORGE_SSH_KEY" | base64 -d > ~/.ssh/sourceforge_rsync
          chmod 600 ~/.ssh/sourceforge_rsync

          # Test connection (optional debug)
          ssh -i ~/.ssh/sourceforge_rsync -o IdentitiesOnly=yes -o StrictHostKeyChecking=no \
            $SOURCEFORGE_USERNAME@frs.sourceforge.net "echo Connected"

          # Create directory
          ssh -i ~/.ssh/sourceforge_rsync -o IdentitiesOnly=yes -o StrictHostKeyChecking=no \
            $SOURCEFORGE_USERNAME@frs.sourceforge.net \
            "mkdir -p /home/frs/project/$SOURCEFORGE_PROJECT/${{ matrix.desktop }}-${{ github.event.inputs.kernel }}" || true

          # Upload
          rsync -avz --progress \
            -e "ssh -i ~/.ssh/sourceforge_rsync -o IdentitiesOnly=yes -o StrictHostKeyChecking=no" \
            "$ISO_FILE" \
            "$SHA256_FILE" \
            "$SOURCEFORGE_USERNAME@frs.sourceforge.net:/home/frs/project/$SOURCEFORGE_PROJECT/${{ matrix.desktop }}-${{ github.event.inputs.kernel }}/"
        env:
          SOURCEFORGE_SSH_KEY: ${{ secrets.SOURCEFORGE_SSH_KEY }}
          SOURCEFORGE_USERNAME: costaoss
          SOURCEFORGE_PROJECT: archcosta

      - name: Display Build Results
        if: failure()
        run: |
          echo "================================================================================"
          echo "❌ ISO build failed - check build logs above"
          echo "================================================================================"
          echo ""
          echo "💡 Make sure to set SOURCEFORGE_SSH_KEY secret in repository settings"
          echo "   Repository Settings → Secrets and variables → Actions → New repository secret"
          echo "   Name: SOURCEFORGE_SSH_KEY"
          echo "   Value: Your SourceForge SSH private key"
          echo "================================================================================"

      - name: Upload ISO artifact (GitHub)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: archcosta-${{ matrix.desktop }}-${{ github.event.inputs.kernel }}-iso
          path: /tmp/out/*.iso

name: Create Pre-Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version/tag'
        required: false
        default: 'latest'
      prerelease:
        description: 'Mark as pre-release'
        required: false
        default: 'true'
        type: boolean

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download ISO artifact
        uses: actions/download-artifact@v4
        with:
          path: .

      - name: List downloaded files
        run: ls -la

      - name: Generate checksums
        run: |
          for iso in *.iso; do
            if [ -f "$iso" ]; then
              echo "Generating checksums for $iso"
              sha256sum "$iso" > "${iso}.sha256"
              sha512sum "$iso" > "${iso}.sha512"
            fi
          done

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version || 'latest' }}
          name: ArchCosta Linux ${{ github.event.inputs.version || 'Latest' }} Build
          body: |
            ## ArchCosta Linux Live ISO

            ### Build Info
            - Build Date: ${{ github.event.inputs.version || 'latest' }}
            - Commit: ${{ github.sha }}

            ### Downloads
            Download the ISO and checksum files below.
          draft: false
          prerelease: ${{ github.event.inputs.prerelease != 'false' }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload ISO to Release
        run: |
          for iso in *.iso; do
            if [ -f "$iso" ]; then
              echo "Uploading $iso..."
              gh release upload ${{ github.event.inputs.version || 'latest' }} "$iso" "${iso}.sha256" "${iso}.sha512" --clobber
            fi
          done
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Display Release URL
        run: |
          echo "✅ Release created successfully!"
          echo "📦 Download: https://github.com/${{ github.repository }}/releases/tag/${{ github.event.inputs.version || 'latest' }}"

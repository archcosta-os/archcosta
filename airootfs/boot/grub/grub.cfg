menuentry "ArchCosta Linux" {
    linux   /%INSTALL_DIR%/boot/%ARCH%/vmlinuz-linux \
            archisobasedir=%INSTALL_DIR% archisosearchuuid=%ARCHISO_UUID% rw quiet splash \
            loglevel=3 nowatchdog mitigations=off nvme_load=yes i915.modeset=1 radeon.modeset=1 nouveau.modeset=1
    initrd  /%INSTALL_DIR%/boot/%ARCH%/initramfs-linux.img
}

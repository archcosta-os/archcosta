# ArchCosta Dracut Configuration
# Use dracut for installed system (BIOS/UEFI), mkinitcpio handled by archiso for live boot

# Compression
compress="zstd"
compression="zstd"

# Modules to add
add_dracutmodules+=" btrfs "

# Modules to omit (skip network by default for live ISO)
omit_dracutmodules+=" network cifs nfs nbd brltty plymouth "

# Hostonly mode (no for generic)
hostonly="no"

# Debug for troubleshooting
# kernel_cmdline="loglevel=7 systemd.log_level=debug"
# logfile="/var/log/dracut.log"

# Firmware paths
firmware_dir="/usr/lib/firmware"
firmware_dirs="/usr/lib/firmware"

# Busybox (for smaller initramfs)
use_dracutfs="yes"

# Base modules
dracutmodules+=" base kernel-modules kernel-modules-extra udev plymouth fs-lib rootfs-block crypt lvm dm " 

# mkinitcpio configuration for ArchCosta Live ISO
# Built with archiso

MODULES=(vmd btrfs dm_mod dm_snapshot dm_mirror dm_bufio vmxnet3 vmwgfx vmw_balloon vmw_vmci vsock pvpanic vboxguest vboxsf)
BINARIES=()
FILES=()

# ArchISO needs the archiso hook chain to mount the SquashFS root
# Removed plymouth to avoid boot hangs - verbose boot for debugging
HOOKS=(base udev autodetect modconf kms keyboard keymap block filesystems fsck archiso archiso_loop_mnt archiso_pxe_common archiso_pxe_nbd archiso_pxe_http archiso_pxe_nfs)

COMPRESSION="zstd"
COMPRESSION_OPTIONS=("-15")


# Disable built-in compression detection
KEEP_PXERETRY="yes"

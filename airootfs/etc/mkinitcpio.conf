# mkinitcpio configuration for ArchCosta Live ISO
# Built with archiso

MODULES=(vmd btrfs dm_mod dm_snapshot dm_mirror dm_bufio vmxnet3 vmwgfx vmw_balloon vmw_vmci vsock pvpanic vboxguest vboxsf)
BINARIES=()
FILES=()

# ArchISO needs the archiso hook chain to mount the SquashFS root
# Standard hook order for reliable live boot
HOOKS=(base udev modconf kms memdisk archiso_shutdown archiso archiso_loop_mnt archiso_pxe_common archiso_pxe_nbd archiso_pxe_http archiso_pxe_nfs block filesystems keyboard keymap consolefont fsck)

COMPRESSION="zstd"
COMPRESSION_OPTIONS=("-19")


# Disable built-in compression detection
KEEP_PXERETRY="yes"

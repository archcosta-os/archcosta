#
# LightDM Configuration for ArchCosta Live
# Supports: XFCE, Plasma, Cinnamon, MATE, GNOME, Hyprland, Sway, Bspwm, Openbox, Wayfire, River, Niri, i3wm
#

[LightDM]
# Minimum display server timeout
minimum-vt=1
# Don't start the greeter on the same VT as xdmcp sessions
start-default-seat=false
# Always show the greeter
greeter-hide-users=false
# Allow manual login
allow-user-switching=true
allow-guest=false
# Disable guest
guest-session=false
# Check graphical
logind-check-graphical=true
# Autologin
autologin-guest=false
autologin-user=live
autologin-user-timeout=0

[Seat:*]
# Session configuration
session-wrapper=/etc/lightdm/Xsession
greeter-session=lightdm-slick-greeter

# X server configuration
xserver-command=X -core -nolisten tcp
xserver-layout=
xserver-allow-tcp=false
xserver-share=true

# Wayland server configuration
wayland-enabled=true
wayland-devices=auto

# VT configuration - let lightdm choose
vt-handoff=true

# User themes
user-theme-name=Adwaita
icon-theme-name=Adwaita

# Allow user switching
allow-user-switching=true
allow-guest=false

# Autologin session - will be auto-detected from desktop files
# Common sessions: hyprland, sway, bspwm, openbox, i3, xfce, plasma, cinnamon, mate, gnome
autologin-session=
user-session=

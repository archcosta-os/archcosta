#
# LightDM Configuration for ArchCosta
#

[LightDM]
# Minimum VT
minimum-vt=1

# Autologin
autologin-user=live
autologin-user-timeout=0

[Seat:*]
# Greeter
greeter-session=lightdm-slick-greeter

# User session (auto-detected from desktop files)
user-session=

# Allow user switching
allow-user-switching=true
allow-guest=false

# X server
xserver-command=X -core

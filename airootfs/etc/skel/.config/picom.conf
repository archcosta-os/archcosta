# Picom Config - ArchCosta

# Backend
backend = "glx";

# Opacity
active-opacity = 1;
inactive-opacity = 0.85;
frame-opacity = 1;
inactive-opacity-override = false;

# Blur
blur-background = true;
blur-method = "kernel";
blur-size = 8;
blur-strength = 5;

# Shadows
shadow = true;
shadow-radius = 8;
shadow-offset-x = -4;
shadow-offset-y = -4;
shadow-opacity = 0.4;
shadow-color = "#000000";

# Corners
corner-radius = 8;
round-borders = 2;

# Fade
fading = true;
fade-in-step = 0.03;
fade-out-step = 0.03;
fade-exclude = [ "class_g = 'slop'" ];

# Exclusions
exclude = [
    "class_g = 'firefox'",
    "class_g = 'Chromium'",
    "class_g = 'thunar'",
    "class_g = 'rofi'",
    "class_g = 'wlogout'"
];

# Vsync
vsync = true;

# Dither
dithered-present = false;

# Mark-wm-focus
mark-wm-focused = true;
mark-ov-redir = true;

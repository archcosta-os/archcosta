# Minimal ArchCosta Hyprland configuration with Waybar + Hyprpaper
monitor=,preferred,auto,1

exec-once=swaybg -i /usr/share/backgrounds/archcosta/default.jpg -m fill
exec-once=waybar
exec-once=wlogout --hidden

input {
    kb_layout = us
    kb_options = caps:escape
    follow_mouse = 1
    touchpad {
        natural_scroll = true
    }
}

general {
    gaps_in = 6
    gaps_out = 12
    border_size = 2
    col.active_border = rgba(55bbeecc)
    col.inactive_border = rgba(444444aa)
}

decoration {
    rounding = 8
    blur = true
    blur_size = 6
    blur_passes = 2
    drop_shadow = true
    shadow_range = 14
    shadow_render_power = 3
}

animations {
    enabled = true
}

bind = SUPER, Return, exec, alacritty
bind = SUPER, Q, killactive,
bind = SUPER, E, exec, dolphin
bind = SUPER, D, exec, rofi -show drun
bind = SUPER, F, togglefloating,
bind = SUPER, P, pseudo,
bind = SUPER, V, togglefullscreen,
bind = SUPER, L, exec, wlogout
bind = SUPER CTRL, R, exec, systemctl reboot
bind = SUPER CTRL, Q, exec, systemctl poweroff

bind = SUPER, left, movefocus, l
bind = SUPER, right, movefocus, r
bind = SUPER, up, movefocus, u
bind = SUPER, down, movefocus, d

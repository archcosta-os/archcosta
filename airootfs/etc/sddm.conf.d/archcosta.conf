[General]
InputMethod=qtvirtualkeyboard
Numlock=on
# Hide cursor timeout
HiddenUsers=root

[Theme]
Current=breeze-dark
CursorTheme=Adwaita
FontSize=12

[Users]
MaximumUid=65000
MinimumUid=1000

[Autologin]
# Live user autologin
User=live
Session=
Relogin=true
# Wait for display
SessionTimeout=60

[Wayland]
EnableHiDPI=true

[XDisplay]
EnableHiDPI=true

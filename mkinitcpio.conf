# mkinitcpio configuration for ArchCosta Live ISO
# Built with archiso

MODULES=()
BINARIES=()
FILES=()

HOOKS=(base udev microcode modconf kms memdisk archiso archiso_loop_mnt archiso_pxe_common archiso_pxe_nbd archiso_pxe_http archiso_pxe_nfs block filesystems keyboard keymap consolefont fsck)

COMPRESSION="zstd"
COMPRESSION_OPTIONS=("-19" "-T0")

# Disable built-in compression detection for faster boot
KEEP_PXERETRY="yes"

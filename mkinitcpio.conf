# mkinitcpio configuration for ArchCosta Live ISO
# Built with archiso

MODULES=()
BINARIES=()
FILES=(/airootfs/etc/vconsole.conf)

HOOKS=(base systemd udev microcode modconf kms keyboard keymap consolefont block filesystems fsck)

COMPRESSION="zstd"
COMPRESSION_OPTIONS=("-19" "-T0")

# Disable built-in compression detection for faster boot
KEEP_PXERETRY="yes"

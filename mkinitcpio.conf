# mkinitcpio configuration for ArchCosta Live ISO
# Built with archiso

MODULES=()
BINARIES=()
FILES=()

# ArchISO needs the archiso hook chain to mount the SquashFS root (memdisk → archiso → loop_mnt → pxE*)
# `microcode` stays so CPU ucode is folded into initramfs instead of separate files.
HOOKS=(base udev microcode modconf kms keyboard keymap consolefont memdisk archiso_shutdown archiso archiso_loop_mnt archiso_pxe_common archiso_pxe_nbd archiso_pxe_http archiso_pxe_nfs block filesystems fsck)

COMPRESSION="zstd"
COMPRESSION_OPTIONS=("-19" "-T0")

# Disable built-in compression detection for faster boot
KEEP_PXERETRY="yes"
